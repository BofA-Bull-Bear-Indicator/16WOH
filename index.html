<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>16 WOH - Ultimate Prep App</title>

<style>

:root{
    --primary:#ff3e3e;
    --bg:#0b0b0b;
    --card:#171717;
    --text:#fff;
    --text-dim:#9e9e9e;
    --accent:#242424;
    --green:#39d98a;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Inter,sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    height:100vh;
    overflow:hidden;
}

/* SIDEBAR */
.sidebar{
    width:74px;
    background:#000;
    border-right:1px solid #1f1f1f;
    overflow-y:auto;
    padding-top:10px;
}

.week-btn{
    width:46px;
    height:46px;
    border:none;
    border-radius:12px;
    margin:8px auto;
    display:block;
    background:#111;
    color:#888;
    font-weight:700;
    cursor:pointer;
}

.week-btn.active{
    background:var(--primary);
    color:#000;
}

/* MAIN */
.main{
    flex:1;
    overflow-y:auto;
    padding:22px;
}

.phase{
    color:var(--primary);
    font-size:0.75rem;
    text-transform:uppercase;
    font-weight:700;
}

h1{margin:6px 0 14px 0;}

/* STATS */
.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-bottom:20px;
}

.stat{
    background:var(--card);
    border-radius:14px;
    padding:14px;
}

.stat-label{font-size:0.75rem;color:#888;}
.stat-value{font-size:1.3rem;font-weight:800;}

/* DAY */
.day-selector{
    display:flex;
    gap:10px;
    overflow-x:auto;
    margin-bottom:20px;
}

.day-btn{
    background:var(--accent);
    color:#aaa;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
}

.day-btn.active{
    background:#fff;
    color:#000;
}

/* TIMELINE */
.timeline{position:relative;}
.timeline::before{
    content:'';
    position:absolute;
    left:16px;
    top:0;
    bottom:0;
    width:2px;
    background:#333;
}

.event{
    position:relative;
    padding-left:52px;
    margin-bottom:22px;
}

.event::before{
    content:'';
    position:absolute;
    left:8px;
    top:4px;
    width:14px;
    height:14px;
    border-radius:50%;
    background:var(--primary);
    border:4px solid var(--bg);
}

.time{color:var(--primary);font-size:0.7rem;font-weight:700;}

.card{
    background:var(--card);
    border-radius:14px;
    padding:14px;
    margin-top:6px;
}

.title{
    display:flex;
    justify-content:space-between;
    margin-bottom:6px;
}

.badge{
    font-size:0.65rem;
    background:#222;
    padding:3px 6px;
    border-radius:6px;
}

.desc{
    color:#bbb;
    white-space:pre-line;
    line-height:1.4;
}

.macro{
    margin-top:10px;
    font-size:0.75rem;
    color:#ddd;
    background:#222;
    padding:8px;
    border-radius:10px;
}

/* SHOPPING */
.shopping{
    margin-top:30px;
    background:var(--card);
    padding:16px;
    border-radius:14px;
}

.shopping-item{
    color:#bbb;
    margin-bottom:6px;
}

</style>
</head>

<body>

<div class="sidebar" id="sidebar"></div>

<div class="main">

<div class="phase" id="phase"></div>
<h1 id="title"></h1>

<div class="stats">
    <div class="stat">
        <div class="stat-label">Week</div>
        <div class="stat-value" id="statWeek"></div>
    </div>
    <div class="stat">
        <div class="stat-label">Progress</div>
        <div class="stat-value" id="statPercent"></div>
    </div>
    <div class="stat">
        <div class="stat-label">Calories</div>
        <div class="stat-value" id="dailyCalories"></div>
    </div>
</div>

<div class="day-selector" id="daySelector"></div>

<div class="timeline" id="timeline"></div>

<div class="shopping">
    <h2>Weekly Shopping List</h2>
    <div id="shoppingList"></div>
</div>

</div>

<script>

/* DAYS */
const days=["Måndag","Tisdag","Onsdag","Torsdag","Fredag","Lördag","Söndag"];

/* STATE */
let currentWeek=parseInt(localStorage.getItem("week"))||1;
let currentDay=localStorage.getItem("day")||"Måndag";

/* FOOD (DETAILED) */
const breakfasts=[
{
name:"Proteinpannkakor",
desc:`40g havregryn
150g äggvita
30g whey vanilj
½ banan
50g blåbär
Kanel

Mixa & stek 2–3 min/sida.`,
p:35,c:28,f:5,kcal:330
},
{
name:"Kvarg bowl",
desc:`300g kvarg 0%
40g granola
80g bär`,
p:30,c:32,f:5,kcal:310
}
];

const proteins=[
{name:"Kyckling 200g",desc:"Grillad kycklingfilé 200g",p:42,c:0,f:4,kcal:220},
{name:"Torsk 200g",desc:"Ugnsbakad torsk 200g",p:40,c:0,f:2,kcal:180},
{name:"Nötfärs 5% 180g",desc:"Stekt nötfärs 180g",p:38,c:0,f:9,kcal:260}
];

const carbs=[
{name:"Ris 100g",desc:"Kokt jasminris 100g",p:3,c:28,f:0,kcal:130},
{name:"Potatis 250g",desc:"Kokt potatis 250g",p:2,c:18,f:0,kcal:80}
];

const veggies=["Broccoli","Spenat","Sparris","Zucchini"];

/* PROGRAM */
const program={
1:{phase:"Fas 1",split:["Bröst","Rygg","Ben","Axlar","Armar","Cardio","Vila"]},
5:{phase:"Fas 2",split:["Bröst","Ben","Rygg","Axlar","Ben","HIIT","Vila"]},
9:{phase:"Peak",split:["Push","Pull","Legs","Upper","Tömning","Walk","Vila"]},
16:{phase:"Final",split:["Pump","Posing","Vila","Pump","Vila","SHOW","Recovery"]}
};

/* HELPERS */
const r=a=>a[Math.floor(Math.random()*a.length)];
const u=(a,e)=>a.filter(x=>!e.includes(x))[Math.floor(Math.random()*a.length)];

function getProg(){
return Object.keys(program).reverse().find(k=>currentWeek>=k);
}

/* SHOPPING (WEEKLY) */
function shopping(){

const map={};

for(let i=0;i<7;i++){

const b=r(breakfasts);
const p=r(proteins);
const c=r(carbs);
const v1=r(veggies);
const v2=u(veggies,[v1]);

[b.name,p.name,c.name,v1,v2].forEach(x=>{
map[x]=(map[x]||0)+1;
});
}

document.getElementById("shoppingList").innerHTML=
Object.entries(map)
.sort((a,b)=>b[1]-a[1])
.map(([k,v])=>`• ${k} × ${v}`)
.join("<br>");
}

/* UI */
function update(){

const data=program[getProg()];
const dayIndex=days.indexOf(currentDay);

const b=r(breakfasts);
const p=r(proteins);
const c=r(carbs);

const total=b.kcal+p.kcal+c.kcal;

document.getElementById("dailyCalories").innerText=total+" kcal";

document.getElementById("phase").innerText=data.phase;
document.getElementById("title").innerText=`V${currentWeek} • ${currentDay}`;

document.getElementById("statWeek").innerText=currentWeek+"/16";
document.getElementById("statPercent").innerText=Math.floor(currentWeek/16*100)+"%";

document.getElementById("timeline").innerHTML=

render("08:00","Frukost",b)+
render("12:00","Lunch",p,c)+
render("17:00","Träning",data.split[dayIndex])+
render("20:00","Middag",p);

shopping();
}

/* RENDER */
function render(time,title,a,b){

const item=b?`${a.desc}\n+ ${b.desc}`:a.desc;

return `
<div class="event">
<div class="time">${time}</div>
<div class="card">
<div class="title">
<div>${title}</div>
<div class="badge">MEAL</div>
</div>
<div class="desc">${item}</div>
</div>
</div>`;
}

/* INIT */
function init(){

const sb=document.getElementById("sidebar");

for(let i=1;i<=16;i++){
const btn=document.createElement("button");
btn.className="week-btn";
btn.innerText=i;
btn.onclick=()=>{currentWeek=i;update();};
sb.appendChild(btn);
}

days.forEach(d=>{
const btn=document.createElement("button");
btn.className="day-btn";
btn.innerText=d;
btn.onclick=()=>{currentDay=d;update();};
document.getElementById("daySelector").appendChild(btn);
});

update();
}

init();

</script>
</body>
</html>
