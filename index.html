<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>16 WOH - Ultimate Prep App</title>
<style>
:root{
    --primary:#ff3e3e;
    --bg:#0b0b0b;
    --card:#171717;
    --text:#fff;
    --text-dim:#9e9e9e;
    --accent:#242424;
    --green:#39d98a;
}
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}
body{
    margin:0;
    font-family:Inter,sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    height:100vh;
    overflow:hidden;
}
.sidebar{
    width:74px;
    background:#000;
    border-right:1px solid #1f1f1f;
    overflow-y:auto;
    flex-shrink:0;
    padding-top:10px;
}
.week-btn{
    width:46px;
    height:46px;
    border:none;
    border-radius:12px;
    margin:8px auto;
    display:block;
    background:#111;
    color:#888;
    cursor:pointer;
    font-weight:700;
    transition:0.2s;
}
.week-btn.active{
    background:var(--primary);
    color:#000;
    transform:scale(1.05);
}
.main{
    flex:1;
    overflow-y:auto;
    padding:22px;
}
.phase{
    color:var(--primary);
    font-size:0.75rem;
    text-transform:uppercase;
    letter-spacing:1px;
    font-weight:700;
}
h1{
    margin:6px 0 14px 0;
}
.progress-wrap{
    width:100%;
    height:12px;
    background:#1b1b1b;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:20px;
}
.progress-fill{
    height:100%;
    background:linear-gradient(90deg,#ff3e3e,#ff8743);
    transition:0.3s;
}
.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-bottom:20px;
}
.stat{
    background:var(--card);
    border-radius:16px;
    padding:14px;
    border:1px solid #252525;
}
.stat-label{
    color:#888;
    font-size:0.75rem;
}
.stat-value{
    font-size:1.2rem;
    font-weight:800;
    margin-top:4px;
}
.day-selector{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding-bottom:10px;
    margin-bottom:20px;
}
.day-btn{
    border:none;
    background:var(--accent);
    color:#aaa;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    white-space:nowrap;
    font-weight:700;
}
.day-btn.active{
    background:white;
    color:black;
}
.timeline{
    position:relative;
}
.timeline::before{
    content:'';
    position:absolute;
    left:16px;
    top:0;
    bottom:0;
    width:2px;
    background:#333;
}
.event{
    position:relative;
    padding-left:52px;
    margin-bottom:24px;
    animation:fadeIn .25s ease;
}
@keyframes fadeIn{
    from{ opacity:0; transform:translateY(8px); }
    to{ opacity:1; transform:translateY(0); }
}
.event::before{
    content:'';
    position:absolute;
    left:8px;
    top:4px;
    width:16px;
    height:16px;
    border-radius:50%;
    background:var(--primary);
    border:4px solid var(--bg);
}
.time{
    color:var(--primary);
    font-size:0.7rem;
    font-weight:700;
    margin-bottom:6px;
}
.card{
    background:var(--card);
    border:1px solid #262626;
    border-radius:16px;
    padding:16px;
    transition:0.2s;
}
.title{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
}
.title-left{
    font-weight:700;
}
.badge{
    background:#282828;
    padding:4px 8px;
    border-radius:8px;
    font-size:0.65rem;
}
.desc{
    color:var(--text-dim);
    line-height:1.5;
}
.macro{
    margin-top:12px;
    padding:8px 10px;
    background:#202020;
    border-radius:10px;
    font-size:0.75rem;
    color:#ddd;
}
.recipe {
    background: rgba(255, 62, 62, 0.05);
    border-left: 3px solid var(--primary);
    padding: 10px;
    border-radius: 6px;
    margin-top: 10px;
    font-size: 0.8rem;
    color: #ccc;
}
.check-btn{
    width:100%;
    border:none;
    background:#262626;
    color:white;
    padding:10px;
    border-radius:10px;
    margin-top:14px;
    cursor:pointer;
    font-weight:700;
}
.check-btn.done{
    background:var(--green);
    color:black;
}

/* SHOPPING LIST STYLES */
.shopping{
    margin-top:40px;
    background:var(--card);
    border-radius:18px;
    padding:20px;
    border:1px solid #262626;
}
.shop-cat-title {
    color: var(--primary);
    font-size: 0.8rem;
    text-transform: uppercase;
    font-weight: 800;
    margin: 15px 0 8px 0;
    letter-spacing: 1px;
}
.shopping-item{
    color:#bbb;
    background: #1e1e1e;
    margin-bottom:4px;
    padding: 8px 12px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    font-size: 0.9rem;
}
</style>
</head>
<body>

<div class="sidebar" id="sidebar"></div>

<div class="main">
    <div class="phase" id="phase"></div>
    <h1 id="title"></h1>
    <div class="progress-wrap">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="stats">
        <div class="stat">
            <div class="stat-label">Vecka</div>
            <div class="stat-value" id="statWeek"></div>
        </div>
        <div class="stat">
            <div class="stat-label">Progression</div>
            <div class="stat-value" id="statPercent"></div>
        </div>
        <div class="stat">
            <div class="stat-label">Kcal/dag</div>
            <div class="stat-value" id="dailyCalories"></div>
        </div>
    </div>
    <div class="day-selector" id="daySelector"></div>
    <div class="timeline" id="timeline"></div>
    
    <div class="shopping">
        <h2 style="margin:0">Inköpslista för veckan</h2>
        <div id="shoppingList"></div>
    </div>
</div>

<script>
const days = ["Måndag", "Tisdag", "Onsdag", "Torsdag", "Fredag", "Lördag", "Söndag"];
let currentWeek = parseInt(localStorage.getItem("week")) || 1;
let currentDay = localStorage.getItem("day") || "Måndag";

/* MATDATA MED KATEGORIER */
const breakfasts = [
    { name: "Äggvitor (200g) + Havregryn (40g)", category: "Frukost & Mejeri", p: 32, c: 38, f: 4, kcal: 320, recipe: "Koka havregrynen i vatten. Rör ner äggvitorna mot slutet för krämig konsistens." },
    { name: "Lättkvarg (250g) + Osötad Granola (30g)", category: "Frukost & Mejeri", p: 30, c: 32, f: 5, kcal: 310 },
    { name: "Proteinpannkakor (30g vassle, 100g äggvita, 20g havremjöl)", category: "Frukost & Mejeri", p: 35, c: 28, f: 5, kcal: 330, recipe: "Mixa ingredienserna och stek på medelvärme." }
];

const snacks = [
    { name: "Proteinshake (30g vassle) + 1 Äpple", category: "Mellanmål & Tillskott", p: 25, c: 15, f: 2, kcal: 180 }
];

const proteins = [
    { name: "Kycklingfilé (200g)", category: "Protein (Kött/Fisk)", p: 42, f: 4, kcal: 220 },
    { name: "Torskfilé (200g)", category: "Protein (Kött/Fisk)", p: 40, f: 2, kcal: 180 },
    { name: "Laxfilé (180g)", category: "Protein (Kött/Fisk)", p: 36, f: 12, kcal: 290 },
    { name: "Nötfärs 5% (180g)", category: "Protein (Kött/Fisk)", p: 38, f: 9, kcal: 260 }
];

const carbs = [
    { name: "Jasminris (100g kokt)", category: "Kolhydrater", p: 3, c: 28, kcal: 130 },
    { name: "Potatis (150g)", category: "Kolhydrater", p: 3, c: 27, kcal: 120 },
    { name: "Sötpotatis (150g)", category: "Kolhydrater", p: 3, c: 33, kcal: 140 }
];

const veggies = [
    { name: "Broccoli (150g)", category: "Grönsaker" },
    { name: "Sparris (100g)", category: "Grönsaker" },
    { name: "Spenat (100g)", category: "Grönsaker" }
];

const workouts = {
    "Bröst/Triceps": ["Lutande Bänkpress 4x8", "Hantelpress 4x10", "Cable Flyes 3x15"],
    "Rygg/Biceps": ["Skivstångsrodd 4x8", "Latsdrag 4x12", "Hammercurls 3x12"],
    "Ben": ["Knäböj 5x5", "Benpress 4x12", "Raka Marklyft 4x10"],
    "Axlar": ["Militärpress 4x10", "Sidolyft 5x15", "Facepulls 3x15"]
};

const program = {
    1: { phase: "Fas 1 - Shock", cardio: "60m PW • Lutning 8", split: ["Bröst/Triceps", "Rygg/Biceps", "Ben", "Axlar", "Bröst/Triceps", "Kondition", "Vila"] },
    5: { phase: "Fas 2 - Grind", cardio: "75m PW • Lutning 10", split: ["Bröst/Triceps", "Ben", "Rygg/Biceps", "Axlar", "Ben", "Intervaller", "Vila"] }
};

/* HELPERS */
function randomPick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function getProgramData(){
    const key = Object.keys(program).reverse().find(k=>currentWeek>=k);
    return program[key];
}

/* GRUPPERAD INKÖPSLISTA */
function generateShoppingList(){
    const shoppingMap = {};
    
    // Simulera veckans måltider för att samla ihop ingredienser
    for(let i = 0; i < 7; i++){
        const items = [
            randomPick(breakfasts),
            randomPick(snacks),
            randomPick(proteins),
            randomPick(carbs),
            randomPick(proteins), // Middagsprotein
            randomPick(veggies)
        ];
        
        items.forEach(item => {
            if(!shoppingMap[item.category]) shoppingMap[item.category] = {};
            shoppingMap[item.category][item.name] = (shoppingMap[item.category][item.name] || 0) + 1;
        });
    }

    let html = '';
    for (const [category, items] of Object.entries(shoppingMap)) {
        html += `<div class="shop-cat-title">${category}</div>`;
        for (const [name, count] of Object.entries(items)) {
            html += `<div class="shopping-item"><span>${name}</span> <strong>x${count}</strong></div>`;
        }
    }
    document.getElementById("shoppingList").innerHTML = html;
}

/* UPDATE UI */
function updateUI(){
    localStorage.setItem("week", currentWeek);
    localStorage.setItem("day", currentDay);

    const data = getProgramData();
    document.getElementById("phase").innerText = data.phase;
    document.getElementById("title").innerText = `Vecka ${currentWeek} • ${currentDay}`;
    
    const percent = Math.floor((currentWeek/16)*100);
    document.getElementById("progressFill").style.width = `${percent}%`;
    document.getElementById("statWeek").innerText = `${currentWeek}/16`;
    document.getElementById("statPercent").innerText = `${percent}%`;

    const b = randomPick(breakfasts);
    const s = randomPick(snacks);
    const p1 = randomPick(proteins);
    const c1 = randomPick(carbs);
    const v1 = randomPick(veggies);
    
    document.getElementById("dailyCalories").innerText = `${b.kcal + s.kcal + p1.kcal + c1.kcal + 200} kcal`;

    const workout = data.split[days.indexOf(currentDay)];

    document.getElementById("timeline").innerHTML = `
        ${renderEvent("06:00", "Morgoncardio", data.cardio, "CARDIO")}
        ${renderEvent("08:30", "Frukost", b.name, "MÅLTID", b, null, b.recipe)}
        ${renderEvent("12:00", "Lunch", `${p1.name} + ${c1.name}`, "MÅLTID", p1)}
        ${renderEvent("15:00", "Mellanmål", s.name, "PROTEIN", s)}
        ${renderEvent("17:00", "Träningspass", workout, "TRÄNING", null, workouts[workout])}
    `;

    generateShoppingList();
}

function renderEvent(time, title, desc, type, macros=null, exercises=null, recipe=null){
    const id = `${currentWeek}-${currentDay}-${title}`;
    const done = JSON.parse(localStorage.getItem("checks") || "{}")[id];

    return `
        <div class="event">
            <div class="time">${time}</div>
            <div class="card">
                <div class="title"><div class="title-left">${title}</div><div class="badge">${type}</div></div>
                <div class="desc">${desc}</div>
                ${recipe ? `<div class="recipe"><strong>Recept:</strong> ${recipe}</div>` : ''}
                ${macros ? `<div class="macro">${macros.kcal || '200+'} kcal • ${macros.p || '30'}g P</div>` : ''}
                ${exercises ? exercises.map(ex=>`<div class="exercise">${ex}</div>`).join('') : ''}
                <button class="check-btn ${done?'done':''}" onclick="toggleCheck('${id}')">${done?'✅ Klart':'Markera som klar'}</button>
            </div>
        </div>`;
}

function toggleCheck(id){
    const checks = JSON.parse(localStorage.getItem("checks") || "{}");
    checks[id] = !checks[id];
    localStorage.setItem("checks", JSON.stringify(checks));
    updateUI();
}

function init(){
    const sidebar = document.getElementById("sidebar");
    for(let i=1;i<=16;i++){
        const btn = document.createElement("button");
        btn.className = "week-btn"; btn.innerText = i;
        if(i===currentWeek) btn.classList.add("active");
        btn.onclick = () => { currentWeek=i; updateUI(); };
        sidebar.appendChild(btn);
    }
    const daySelector = document.getElementById("daySelector");
    days.forEach(day => {
        const btn = document.createElement("button");
        btn.className = "day-btn"; btn.innerText = day;
        if(day===currentDay) btn.classList.add("active");
        btn.onclick = () => { currentDay=day; updateUI(); };
        daySelector.appendChild(btn);
    });
    updateUI();
}

init();
</script>
</body>
</html>
