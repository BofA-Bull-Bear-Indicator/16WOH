<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16 WOH - Manual</title>
    <style>
        :root { --primary: #ff3e3e; --bg: #0f0f0f; --card: #1a1a1a; --text: #ececec; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidomeny för veckor */
        .sidebar { width: 80px; background: #000; display: flex; flex-direction: column; align-items: center; overflow-y: auto; border-right: 1px solid #333; }
        .week-btn { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #333; background: none; color: white; margin: 10px 0; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .week-btn.active { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 10px var(--primary); }

        /* Huvudinnehåll */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .phase-badge { background: var(--primary); color: black; padding: 5px 15px; border-radius: 20px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        
        .section-title { color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin: 30px 0 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        .card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        
        .diet-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .diet-item { background: #252525; padding: 15px; border-radius: 8px; border-left: 3px solid var(--primary); }

        .exercise-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #2a2a2a; }
        .exercise-row:last-child { border-bottom: none; }
        .ex-name { font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    </div>

<div class="main-content">
    <div id="content-area">
        </div>
</div>

<script>
    // Din kompletta databas
    const programData = {
        1: {
            phase: "Fas 1: Shock & Cleanse",
            diet: ["6 äggvitor & havregryn", "Kyckling & Broccoli", "Torsk & Spenat", "Kvarg naturell"],
            workout: [
                { name: "Morgon-PW", val: "60 min" },
                { name: "Knäböj", val: "4 x 15" },
                { name: "Marklyft", val: "3 x 10" },
                { name: "Militärpress", val: "4 x 12" }
            ]
        },
        2: {
            phase: "Fas 1: Uppbyggnad",
            diet: ["Samma som V1", "Addera 20g nötter", "Fokus på vattenintag"],
            workout: [
                { name: "Morgon-PW", val: "60 min" },
                { name: "Bänkpress", val: "5 x 10" },
                { name: "Stångrodd", val: "4 x 12" },
                { name: "Löpintervaller", val: "10 x 40/20" }
            ]
        },
        // Fortsätt fylla på upp till 16...
    };

    const sidebar = document.getElementById('sidebar');
    const contentArea = document.getElementById('content-area');

    // Skapa knappar för alla 16 veckor
    for (let i = 1; i <= 16; i++) {
        const btn = document.createElement('button');
        btn.innerText = i;
        btn.className = 'week-btn';
        btn.id = `btn-${i}`;
        btn.onclick = () => loadWeek(i);
        sidebar.appendChild(btn);
    }

    function loadWeek(weekNum) {
        // Uppdatera knappar
        document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${weekNum}`).classList.add('active');

        const data = programData[weekNum] || { phase: "Data saknas", diet: [], workout: [] };

        // Rendera innehåll
        contentArea.innerHTML = `
            <div class="phase-badge">${data.phase}</div>
            <h1>Vecka ${weekNum}</h1>

            <h3 class="section-title">Matschema</h3>
            <div class="diet-grid">
                ${data.diet.map(item => `<div class="diet-item">${item}</div>`).join('')}
            </div>

            <h3 class="section-title">Träningspass</h3>
            <div class="card">
                ${data.workout.map(ex => `
                    <div class="exercise-row">
                        <span class="ex-name">${ex.name}</span>
                        <span>${ex.val}</span>
                    </div>
                `).join('')}
            </div>
        `;
    }

    // Starta på vecka 1
    loadWeek(1);
</script>

</body>
</html>
