<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16 WOH - Daglig Guide</title>
    <style>
        :root {
            --primary: #ff3e3e; --bg: #0b0b0b; --card: #181818;
            --sidebar-bg: #000; --text: #fff; --text-dim: #b0b0b0;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Veckomeny */
        .sidebar { width: 70px; background: var(--sidebar-bg); display: flex; flex-direction: column; align-items: center; overflow-y: auto; border-right: 1px solid #222; flex-shrink: 0; }
        .week-btn { width: 45px; height: 45px; border-radius: 8px; border: 1px solid #333; background: #111; color: var(--text-dim); margin: 8px 0; cursor: pointer; font-weight: bold; }
        .week-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }

        /* Huvudinnehåll */
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .header { margin-bottom: 20px; }
        .phase-badge { color: var(--primary); font-size: 0.8rem; font-weight: bold; text-transform: uppercase; border: 1px solid var(--primary); padding: 4px 10px; border-radius: 4px; }

        /* Dag-väljare */
        .day-selector { display: flex; gap: 8px; margin: 20px 0; overflow-x: auto; padding-bottom: 10px; }
        .day-btn { background: #222; border: 1px solid #333; color: white; padding: 8px 15px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
        .day-btn.active { background: white; color: black; border-color: white; }

        /* Kort */
        .intro-box { background: #1a1a1a; padding: 15px; border-radius: 10px; border-left: 4px solid var(--primary); margin-bottom: 20px; font-style: italic; font-size: 0.9rem; }
        .section-title { color: var(--primary); text-transform: uppercase; font-size: 0.9rem; margin-top: 25px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid #222; }
        .item-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #252525; }
        .item-row:last-child { border-bottom: none; }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar"></div>

<div class="main-content">
    <div id="content-area">
        <div class="header">
            <span id="phase-label" class="phase-badge">Laddar...</span>
            <h1 id="week-label">Vecka 1</h1>
        </div>
        
        <div id="intro-label" class="intro-box"></div>

        <div class="day-selector" id="day-selector">
            </div>

        <div class="section-title">Dagens Kost</div>
        <div id="diet-list" class="card"></div>

        <div class="section-title">Dagens Träningspass</div>
        <div id="workout-list" class="card"></div>
    </div>
</div>

<script>
    const daysArr = ["Måndag", "Tisdag", "Onsdag", "Torsdag", "Fredag", "Lördag", "Söndag"];
    let currentWeek = 1;
    let currentDay = "Måndag";

    const programData = {
        1: {
            phase: "Fas 1: Shock",
            intro: "Välkommen! Denna vecka fokuserar vi på att eliminera socker och bygga morgonrutiner.",
            days: {
                "Måndag": { diet: ["6 äggvitor", "1dl havregryn", "200g kyckling", "200g torsk"], workout: [{n:"Morgon-PW", v:"60m"}, {n:"Bröst/Triceps", v:"4x12"}] },
                "Tisdag": { diet: ["Samma som måndag"], workout: [{n:"Morgon-PW", v:"60m"}, {n:"Rygg/Biceps", v:"4x12"}] },
                "Onsdag": { diet: ["Samma som måndag"], workout: [{n:"Morgon-PW", v:"60m"}, {n:"Vila från gym", v: "-"}] },
                "Torsdag": { diet: ["Samma som måndag"], workout: [{n:"Morgon-PW", v:"60m"}, {n:"Ben", v:"4x15"}] },
                "Fredag": { diet: ["Samma som måndag"], workout: [{n:"Morgon-PW", v:"60m"}, {n:"Axlar/Mage", v:"4x12"}] },
                "Lördag": { diet: ["Samma som måndag"], workout: [{n:"Morgon-PW", v:"60m"}, {n:"Löpning", v:"5km"}] },
                "Söndag": { diet: ["Samma som måndag"], workout: [{n:"Morgon-PW", v:"60m"}, {n:"Aktiv vila", v:"Stretch"}] }
            }
        },
        // Du kan nu enkelt kopiera strukturen ovan för vecka 2-16
        2: {
            phase: "Fas 1: Shock",
            intro: "Vecka 2. Nu ökar vi intensiteten i gymmet. Håll vätskebalansen!",
            days: {
                "Måndag": { diet: ["Addera mandlar", "Kyckling & Broccoli"], workout: [{n:"Morgon-PW", v:"60m"}, {n:"Tung bröst", v:"5x5"}] },
                // ... fyll på resterande dagar
            }
        }
    };

    // Rendera Veckomeny
    const sidebar = document.getElementById('sidebar');
    for (let i = 1; i <= 16; i++) {
        const btn = document.createElement('button');
        btn.innerText = i;
        btn.className = 'week-btn' + (i === 1 ? ' active' : '');
        btn.onclick = () => {
            currentWeek = i;
            document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateUI();
        };
        sidebar.appendChild(btn);
    }

    // Rendera Dag-väljare
    const daySelector = document.getElementById('day-selector');
    daysArr.forEach(day => {
        const btn = document.createElement('button');
        btn.innerText = day;
        btn.className = 'day-btn' + (day === "Måndag" ? ' active' : '');
        btn.onclick = () => {
            currentDay = day;
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateUI();
        };
        daySelector.appendChild(btn);
    });

    function updateUI() {
        const weekData = programData[currentWeek] || programData[1];
        const dayData = weekData.days[currentDay] || weekData.days["Måndag"];

        document.getElementById('phase-label').innerText = weekData.phase;
        document.getElementById('week-label').innerText = `Vecka ${currentWeek} - ${currentDay}`;
        document.getElementById('intro-label').innerText = weekData.intro;

        // Rendera Diet
        document.getElementById('diet-list').innerHTML = dayData.diet.map(item => `
            <div class="item-row"><span>${item}</span></div>
        `).join('');

        // Rendera Träning
        document.getElementById('workout-list').innerHTML = dayData.workout.map(ex => `
            <div class="item-row">
                <strong>${ex.n}</strong>
                <span style="color:var(--primary)">${ex.v}</span>
            </div>
        `).join('');
    }

    updateUI();
</script>

</body>
</html>
